version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: propjection-db
    environment:
      POSTGRES_DB: propjection
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: propjection-backend
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "django-insecure-dev-key-change-in-production"
      POSTGRES_DB: "propjection"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      DATABASE_HOST: "db"
      DATABASE_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DO_INFERENCE_MODEL_ACCESS_TOKEN: ${DO_INFERENCE_MODEL_ACCESS_TOKEN}
      DO_MODEL_NAME: ${DO_MODEL_NAME}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: propjection-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8000/api"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
